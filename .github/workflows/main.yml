name: WinHub Emulator Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: brew install xcodegen
      
      - name: Prep Project
        run: |
          mkdir -p WinHub
          # Generate the Plist with Gamepad Support
          cat <<'EOF' > WinHub/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>WinHub</string>
            <key>GCSupportedGameControllers</key>
            <array>
                <dict><key>ProfileName</key><string>ExtendedGamepad</string></dict>
            </array>
            <key>GCSupportsControllerUserInterface</key>
            <true/>
            <key>UIRequiredDeviceCapabilities</key>
            <array><string>arm64</string><string>metal</string></array>
          </dict>
          </plist>
          EOF
          xcodegen generate

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project WinHub.xcodeproj \
            -scheme WinHub \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/WinHub.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Package
        run: |
          mkdir -p build/Payload
          cp -r build/WinHub.xcarchive/Products/Applications/WinHub.app build/Payload/
          chmod +x build/Payload/WinHub.app/WinHub
          cd build && zip -r WinHub_Emulator.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: WinHub-Emulator-IPA
          path: build/WinHub_Emulator.ipa
